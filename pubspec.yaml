name: little_light
description: A new Flutter project.
publish_to: none

# application version
version: 2.2.4+2002004

environment:
  sdk: ^3.12.2
  flutter: 3.44.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # native bridges
  device_info_plus: ^13.2.0
  package_info_plus: ^10.2.0 
  wakelock_plus: ^1.6.1
  app_links: ^7.2.1
  shared_preferences: ^2.5.5
  sqflite: ^2.4.3
  path_provider: ^2.1.6
  url_launcher: ^6.3.2
  in_app_review: ^2.0.12
  protocol_registry: ^0.0.5
  flutter_web_auth_2: ^5.0.3

  # api clients
  bungie_api: 14.0.0

  # dependency_injection
  get_it: ^9.2.1   
  provider: ^6.1.5+1

  # configuration
  flutter_dotenv: ^6.0.1

  # analytics
  firebase_analytics: ^12.4.3 
  firebase_crashlytics: ^5.2.4
  
  # ui utils
  tinycolor2: ^3.0.1
  font_awesome_flutter: ^11.0.0
  shimmer: ^3.0.0
  timeago: ^3.7.1
  flutter_switch: ^0.3.2
  cached_network_image: ^3.4.1
  flutter_linkify: ^6.0.0
  bubble: ^1.2.1
  
  # utils
  archive: ^4.0.9
  logger: ^2.7.0
  flutter_phoenix: ^1.1.1
  json_annotation: ^4.12.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.15.1
  json_serializable: ^6.14.0
  analyzer: ^13.0.0
  sqflite_common_ffi: ^2.4.2
  msix: ^3.18.0


# For information on the generic Dart part of this file, see the
# following page: https://www.dartlang.org/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/_env
    - assets/
    - assets/imgs/
    - assets/imgs/flags/
    - assets/anim/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.io/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.io/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: LittleLightIcons
      fonts:
        - asset: fonts/LittleLightIcons.ttf
    - family: NeueHaasDisplay
      fonts:
        - asset: fonts/NeueHaasDisplay-Thin.ttf
          weight: 300
        - asset: fonts/NeueHaasDisplay-ThinItalic.ttf
          weight: 300
          style: italic
        - asset: fonts/NeueHaasDisplay-Roman.ttf
          weight: 500
        - asset: fonts/NeueHaasDisplay-Medium.ttf
          weight: 700
        - asset: fonts/NeueHaasDisplay-Bold.ttf
          weight: 900

msix_config:
  display_name: Little Light
  publisher: CN=D41F7C98-9BEA-49A9-95B5-EF33973EF3D4
  publisher_display_name: João Paulo Marquesini
  identity_name: 30473JooPauloMarquesini.LittleLightforDestiny2
  logo_path: ./windows/runner/resources/app-icon.png
  protocol_activation: luzinha
  capabilities: internetClient,runFullTrust
  msstore_appId: 9PMG9ZQ41K95
  store: true
  app_installer:
    publish_folder_path: ./msix
    hours_between_update_checks: 0
    automatic_background_task: false
    update_blocks_activation: false
    show_prompt: true
    force_update_from_any_version: false
